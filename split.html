<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Metro · Splitwise</title>
<style>
  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

  :root {
    --bg:        #fafafa;
    --card:      #ffffff;
    --text:      #1a1a1a;
    --muted:     #6b6b6b;
    --subtle:    #e5e5e5;
    --accent:    #cc2233;
    --accent-dim:#fce4e6;
    --green:     #1a8a4a;
    --green-dim:#f0faf3;
    --amber:     #d97706;
    --radius:    10px;
    --shadow:    0 1px 3px rgba(0,0,0,0.06);
  }

  html { font-size: 15px; -webkit-font-smoothing: antialiased; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg); color: var(--text); line-height: 1.5;
    min-height: 100vh; max-width: 500px; margin: 0 auto;
  }

  header {
    padding: 24px 16px 8px;
    display: flex; align-items: center; gap: 10px;
  }
  header .dot { width: 11px; height: 11px; border-radius: 50%; background: var(--accent); flex-shrink: 0; }
  header h1 { font-size: 1.1rem; font-weight: 700; }
  header span { color: var(--muted); font-size: 0.75rem; font-weight: 500; display: block; }

  .back-link {
    display: inline-block; padding: 0 16px;
    font-size: 0.75rem; color: var(--accent); font-weight: 600;
    text-decoration: none; margin-bottom: 4px;
  }

  main { padding: 8px 14px 64px; }

  /* Tabs */
  .tab-row {
    display: flex; gap: 0; padding: 0 0 8px;
    border-bottom: 1px solid var(--subtle); margin-bottom: 16px;
  }
  .tab-row button {
    flex: 1; font: inherit; font-size: 0.78rem; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.3px;
    padding: 10px 8px; background: none; border: none;
    border-bottom: 3px solid transparent;
    color: var(--muted); cursor: pointer; transition: 0.15s;
  }
  .tab-row button.active { color: var(--accent); border-bottom-color: var(--accent); }

  /* Form */
  .form-card {
    background: var(--card); border: 1px solid var(--subtle);
    border-radius: var(--radius); padding: 16px; margin-bottom: 14px;
    box-shadow: var(--shadow);
  }
  .form-card label {
    font-size: 0.68rem; font-weight: 600; color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.5px; display: block; margin-bottom: 4px;
    margin-top: 10px;
  }
  .form-card label:first-child { margin-top: 0; }
  .form-card input, .form-card select {
    width: 100%; font: inherit; font-size: 0.88rem;
    padding: 9px 11px; border: 1px solid var(--subtle);
    border-radius: 8px; background: var(--card);
  }
  .form-card input:focus, .form-card select:focus {
    outline: none; border-color: var(--accent);
  }

  .player-chips {
    display: flex; flex-wrap: wrap; gap: 5px; margin-top: 4px;
  }
  .chip {
    font-size: 0.72rem; font-weight: 600; padding: 6px 10px;
    border-radius: 16px; border: 1px solid var(--subtle);
    background: var(--card); cursor: pointer; transition: 0.12s;
    user-select: none;
  }
  .chip.selected { background: var(--accent); border-color: var(--accent); color: #fff; }
  .chip.all { background: #f0f0f0; }

  .btn {
    width: 100%; font: inherit; font-size: 0.88rem; font-weight: 700;
    padding: 11px; border: none; border-radius: var(--radius);
    background: var(--accent); color: #fff; cursor: pointer;
    margin-top: 12px; transition: 0.15s;
  }
  .btn:disabled { opacity: 0.35; pointer-events: none; }

  /* Balances */
  .balance-card {
    background: var(--card); border: 1px solid var(--subtle);
    border-radius: var(--radius); padding: 14px; margin-bottom: 8px;
    box-shadow: var(--shadow);
    display: flex; align-items: center; justify-content: space-between;
    font-size: 0.85rem; font-weight: 600;
  }
  .balance-card.positive { border-left: 3px solid var(--green); }
  .balance-card.negative { border-left: 3px solid var(--accent); }
  .balance-card .amount { font-size: 1rem; font-weight: 800; }
  .balance-card.positive .amount { color: var(--green); }
  .balance-card.negative .amount { color: var(--accent); }

  /* Settlements */
  .settle-card {
    background: var(--green-dim); border: 1px solid #b7e4c7;
    border-radius: var(--radius); padding: 12px 14px; margin-bottom: 8px;
    font-size: 0.85rem; font-weight: 600;
    display: flex; align-items: center; gap: 8px;
  }
  .settle-arrow { color: var(--green); font-size: 1.1rem; }

  /* History */
  .expense-card {
    background: var(--card); border: 1px solid var(--subtle);
    border-radius: var(--radius); padding: 12px 14px; margin-bottom: 8px;
    box-shadow: var(--shadow);
  }
  .expense-card .top { display: flex; justify-content: space-between; margin-bottom: 4px; }
  .expense-card .payer { font-weight: 700; font-size: 0.85rem; }
  .expense-card .amount { font-weight: 800; color: var(--accent); }
  .expense-card .desc { font-size: 0.75rem; color: var(--muted); }
  .expense-card .split { font-size: 0.7rem; color: var(--muted); margin-top: 4px; }

  .empty { text-align: center; padding: 32px; color: var(--muted); font-size: 0.85rem; }
</style>
</head>
<body>

<header>
  <div class="dot"></div>
  <div><h1>Splitwise</h1><span>Metro Hong Kong · WMUCC 2026</span></div>
</header>
<a href="index.html" class="back-link">← Back to schedule</a>

<div class="tab-row">
  <button id="tab-add" class="active" onclick="switchTab('add')">Add Expense</button>
  <button id="tab-balance" onclick="switchTab('balance')">Balances</button>
  <button id="tab-history" onclick="switchTab('history')">History</button>
</div>

<main id="main"></main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// ── Supabase (same key as index.html) ──
const SB = supabase.createClient(
  'https://ixmlpzipuigsdfzzxvld.supabase.co',
  ['eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9','eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml4bWxwemlwdWlnc2Rmenp4dmxkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5Mzk5NDQsImV4cCI6MjA5MDUxNTk0NH0','WRb0EdH7GKK2TsZdJ32_eanMC_aGgDEPysr0hlNTWks'].join('.')
);

const PLAYERS = [
  "Ada","Chor","Christy","Chuck","D Lu","Dave Learn","DIP","Dustin",
  "Emily","Esther","Eunice","Fran","Gio","Henry","JJ","Jess",
  "J Wu","Kay","Kris","Larry","Maisy","Max","Richard","Salina"
];

let currentTab = 'add';
let selectedSplitters = new Set();

// ── Data ──
async function addExpense(paidBy, totalAmount, desc, splits) {
  // splits = [{player, share}, ...]
  const { data, error } = await SB.from('expenses').insert({
    paid_by: paidBy, amount: parseFloat(totalAmount), description: desc
  }).select('id').single();

  if (error) { alert('Error: ' + error.message); return false; }

  const rows = splits.map(s => ({
    expense_id: data.id, player_name: s.player, share: parseFloat(s.share)
  }));

  const { error: e2 } = await SB.from('expense_splits').insert(rows);
  if (e2) { alert('Error: ' + e2.message); return false; }
  return true;
}

async function getAllExpenses() {
  const { data: expenses } = await SB.from('expenses').select('*').order('created_at', { ascending: false });
  if (!expenses) return [];

  const ids = expenses.map(e => e.id);
  if (!ids.length) return [];

  const { data: splits } = await SB.from('expense_splits').select('*').in('expense_id', ids);

  return expenses.map(e => {
    const mySplits = (splits || []).filter(s => s.expense_id === e.id);
    return {
      ...e,
      splits: mySplits.map(s => ({ player: s.player_name, share: s.share }))
    };
  });
}

function calculateBalances(expenses) {
  const bal = {};
  for (const p of PLAYERS) bal[p] = 0;

  for (const e of expenses) {
    bal[e.paid_by] += e.amount;
    for (const s of e.splits) {
      bal[s.player] -= s.share;
    }
  }
  for (const p of PLAYERS) bal[p] = parseFloat(bal[p].toFixed(2));
  return bal;
}

function simplifyDebts(balances) {
  const debtors = [];  // owe money (negative balance)
  const creditors = []; // owed money (positive balance)

  for (const [name, bal] of Object.entries(balances)) {
    if (bal < -0.01) debtors.push({ name, amount: -bal });
    else if (bal > 0.01) creditors.push({ name, amount: bal });
  }

  debtors.sort((a, b) => b.amount - a.amount);
  creditors.sort((a, b) => b.amount - a.amount);

  const settlements = [];
  let i = 0, j = 0;
  while (i < debtors.length && j < creditors.length) {
    const amount = Math.min(debtors[i].amount, creditors[j].amount);
    if (amount > 0.01) {
      settlements.push({
        from: debtors[i].name,
        to: creditors[j].name,
        amount: parseFloat(amount.toFixed(2))
      });
    }
    debtors[i].amount -= amount;
    creditors[j].amount -= amount;
    if (debtors[i].amount < 0.01) i++;
    if (creditors[j].amount < 0.01) j++;
  }
  return settlements;
}

// ── Render ──
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-row button').forEach(b => b.className = '');
  document.getElementById('tab-' + tab).className = 'active';
  render();
}

async function render() {
  let html = '';

  if (currentTab === 'add') {
    html += `<div class="form-card">
      <label>Paid by</label>
      <select id="paidBy">
        <option value="">— Select —</option>
        ${PLAYERS.map(p => `<option>${p}</option>`).join('')}
      </select>
      <label>Amount (£)</label>
      <input type="number" id="amount" placeholder="0.00" step="0.01" min="0.01" onchange="updateSplitInputs()" oninput="updateSplitInputs()">
      <label>Description</label>
      <input type="text" id="desc" placeholder="e.g. Team dinner, groceries…">
      <label>Split between</label>
      <div class="player-chips" id="chipContainer">
        <span class="chip all" onclick="toggleAll()">Everyone</span>
        ${PLAYERS.map(p => `<span class="chip${selectedSplitters.has(p)?' selected':''}" data-player="${p}" onclick="toggleChip(this)">${p}</span>`).join('')}
      </div>
      <div id="splitAmounts"></div>
      <div id="splitTotal" style="font-size:0.72rem;color:var(--muted);margin-top:6px;display:none;"></div>
      <button class="btn" onclick="handleAdd()">Add Expense</button>
    </div>`;
    // After render, attach listeners to update split amounts
    setTimeout(updateSplitInputs, 50);
  }

  if (currentTab === 'balance') {
    const expenses = await getAllExpenses();
    if (!expenses.length) {
      html += `<div class="empty">No expenses yet. Add one to see balances.</div>`;
    } else {
      const bal = calculateBalances(expenses);
      const settlements = simplifyDebts(bal);

      html += `<h3 style="font-size:0.82rem;font-weight:700;margin-bottom:8px;">Individual Balances</h3>`;
      const sorted = Object.entries(bal).filter(([,v]) => Math.abs(v) > 0.01).sort((a,b) => b[1] - a[1]);
      for (const [name, b] of sorted) {
        const pos = b > 0;
        html += `<div class="balance-card ${pos?'positive':'negative'}">
          <span>${name}</span>
          <span class="amount">${pos?'+':''}£${b.toFixed(2)}</span>
        </div>`;
      }

      if (settlements.length > 0) {
        html += `<h3 style="font-size:0.82rem;font-weight:700;margin:16px 0 8px;">Simplified Settlements</h3>`;
        for (const s of settlements) {
          html += `<div class="settle-card">
            <span>${s.from}</span>
            <span class="settle-arrow">→</span>
            <span>${s.to}</span>
            <span style="margin-left:auto;font-weight:800;">£${s.amount.toFixed(2)}</span>
          </div>`;
        }
      }
    }
  }

  if (currentTab === 'history') {
    const expenses = await getAllExpenses();
    if (!expenses.length) {
      html += `<div class="empty">No expenses recorded.</div>`;
    } else {
      for (const e of expenses) {
        html += `<div class="expense-card">
          <div class="top">
            <span class="payer">${e.paid_by} paid</span>
            <span class="amount">£${e.amount.toFixed(2)}</span>
          </div>
          <div class="desc">${e.description || 'No description'}</div>
          <div class="split">Split: ${e.splits.map(s => `${s.player} £${s.share.toFixed(2)}`).join(', ')}</div>
        </div>`;
      }
    }
  }

  document.getElementById('main').innerHTML = html;
}

// ── Interactions ──
window.toggleChip = function(el) {
  el.classList.toggle('selected');
  const p = el.dataset.player;
  if (el.classList.contains('selected')) selectedSplitters.add(p);
  else selectedSplitters.delete(p);
  updateSplitInputs();
};

window.toggleAll = function() {
  const allChip = document.querySelector('.chip.all');
  if (selectedSplitters.size === PLAYERS.length) {
    selectedSplitters.clear();
    allChip.classList.remove('selected');
    document.querySelectorAll('.chip[data-player]').forEach(c => c.classList.remove('selected'));
  } else {
    PLAYERS.forEach(p => selectedSplitters.add(p));
    allChip.classList.add('selected');
    document.querySelectorAll('.chip[data-player]').forEach(c => c.classList.add('selected'));
  }
  updateSplitInputs();
};

window.updateSplitInputs = function() {
  const container = document.getElementById('splitAmounts');
  const totalEl = document.getElementById('splitTotal');
  const amount = parseFloat(document.getElementById('amount')?.value) || 0;
  if (!container) return;

  const players = [...selectedSplitters];
  if (!players.length) { container.innerHTML = ''; totalEl.style.display = 'none'; return; }

  const evenShare = players.length ? parseFloat((amount / players.length).toFixed(2)) : 0;

  container.innerHTML = players.map(p => `
    <div style="display:flex;align-items:center;gap:8px;margin-top:6px;">
      <span style="font-size:0.78rem;font-weight:600;min-width:70px;">${p}</span>
      <span style="font-size:0.7rem;color:var(--muted);">£</span>
      <input type="number" step="0.01" min="0" value="${evenShare}"
        data-player="${p}" class="split-amt"
        onchange="updateSplitTotal()"
        style="flex:1;font:inherit;font-size:0.8rem;padding:5px 8px;border:1px solid var(--subtle);border-radius:6px;">
    </div>
  `).join('');

  updateSplitTotal();
};

window.updateSplitTotal = function() {
  const totalEl = document.getElementById('splitTotal');
  const inputs = document.querySelectorAll('.split-amt');
  let total = 0;
  inputs.forEach(i => total += parseFloat(i.value) || 0);
  totalEl.style.display = 'block';
  const amt = parseFloat(document.getElementById('amount')?.value) || 0;
  const diff = total - amt;
  totalEl.innerHTML = `Split total: £${total.toFixed(2)} ${diff !== 0 ? `<span style="color:${Math.abs(diff)>0.02?'var(--accent)':'var(--green)'}">(${diff>0?'over by':'under by'} £${Math.abs(diff).toFixed(2)})</span>` : '<span style="color:var(--green)">✓</span>'}`;
};

window.handleAdd = async function() {
  const paidBy = document.getElementById('paidBy').value;
  const amount = document.getElementById('amount').value;
  const desc = document.getElementById('desc').value;

  if (!paidBy) return alert('Select who paid');
  if (!amount || parseFloat(amount) <= 0) return alert('Enter a valid amount');

  // Collect individual split amounts
  const inputs = document.querySelectorAll('.split-amt');
  const splits = [];
  for (const inp of inputs) {
    const v = parseFloat(inp.value);
    if (v > 0) splits.push({ player: inp.dataset.player, share: v });
  }
  if (!splits.length) return alert('Select who to split with');

  // Verify total matches
  const splitTotal = splits.reduce((s, x) => s + x.share, 0);
  if (Math.abs(splitTotal - parseFloat(amount)) > 0.02) {
    return alert(`Split total (£${splitTotal.toFixed(2)}) must equal amount (£${parseFloat(amount).toFixed(2)})`);
  }

  const ok = await addExpense(paidBy, amount, desc, splits);
  if (ok) {
    selectedSplitters.clear();
    document.querySelectorAll('.chip').forEach(c => c.classList.remove('selected'));
    document.getElementById('amount').value = '';
    document.getElementById('desc').value = '';
    switchTab('balance');
  }
};

// ── Init ──
render();
</script>
</body>
</html>
