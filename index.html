<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Metro · WMUCC 2026</title>
<style>
  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

  :root {
    --bg:        #fafafa;
    --card:      #ffffff;
    --text:      #1a1a1a;
    --muted:     #6b6b6b;
    --subtle:    #e5e5e5;
    --accent:    #cc2233;
    --accent-dim:#fce4e6;
    --green:     #1a8a4a;
    --amber:     #d97706;
    --radius:    12px;
    --shadow:    0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
  }

  html { font-size: 17px; -webkit-font-smoothing: antialiased; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg); color: var(--text); line-height: 1.5; min-height: 100vh;
  }

  /* ── Header ── */
  header {
    padding: 32px 24px 20px; max-width: 700px; margin: 0 auto;
    display: flex; align-items: flex-end; justify-content: space-between;
    flex-wrap: wrap; gap: 12px;
  }
  .brand { display: flex; align-items: center; gap: 10px; }
  .brand .dot { width: 11px; height: 11px; border-radius: 50%; background: var(--accent); flex-shrink: 0; }
  .brand h1 { font-size: 1.35rem; font-weight: 700; letter-spacing: -0.3px; }
  .brand span { color: var(--muted); font-size: 0.8rem; font-weight: 500; }
  .badge { font-size: 0.72rem; font-weight: 600; color: var(--accent); background: var(--accent-dim); padding: 4px 10px; border-radius: 20px; }

  /* ── Tab bar ── */
  nav {
    max-width: 700px; margin: 0 auto; display: flex; overflow-x: auto; gap: 2px;
    padding: 0 20px 12px; scrollbar-width: none; -ms-overflow-style: none;
    border-bottom: 1px solid var(--subtle);
  }
  nav::-webkit-scrollbar { display: none; }
  nav button {
    flex: 0 0 auto; font: inherit; font-size: 0.72rem; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.4px; color: var(--muted);
    background: none; border: none; padding: 8px 13px; border-radius: 8px;
    cursor: pointer; transition: 0.15s; white-space: nowrap; position: relative;
  }
  nav button:hover { color: var(--text); background: rgba(0,0,0,0.03); }
  nav button.active { color: var(--accent); background: var(--accent-dim); }
  nav button .dot { position: absolute; top: 6px; right: 7px; width: 5px; height: 5px; border-radius: 50%; background: var(--amber); }
  nav button.past { opacity: 0.5; }
  nav button.past .dot { background: var(--muted); }

  /* ── Main ── */
  main { max-width: 700px; margin: 0 auto; padding: 24px 20px 80px; }
  .day-label { font-size: 0.7rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.6px; color: var(--muted); margin-bottom: 8px; }
  .day-label em { font-style: normal; color: var(--accent); }
  h2 { font-size: 1.5rem; font-weight: 700; letter-spacing: -0.3px; margin-bottom: 20px; }

  /* ── Game card ── */
  .card {
    background: var(--card); border: 1px solid var(--subtle);
    border-radius: var(--radius); padding: 20px 22px; margin-bottom: 14px;
    box-shadow: var(--shadow);
    display: grid; grid-template-columns: 1fr auto 1fr;
    align-items: center; gap: 10px 16px;
    cursor: pointer; transition: 0.15s;
  }
  .card:hover { border-color: #ccc; }
  .card.expanded { border-color: var(--accent); cursor: default; }
  .card-time {
    grid-column: 1 / -1; font-size: 0.75rem; font-weight: 600;
    color: var(--accent); letter-spacing: 0.4px; text-transform: uppercase;
    display: flex; align-items: center; gap: 12px;
  }
  .card-time::after, .card-time::before { content:''; flex:1; height:1px; background: var(--subtle); }

  .team { text-align: center; }
  .team .flag { font-size: 1.6rem; margin-bottom: 2px; }
  .team .name { font-size: 0.95rem; font-weight: 700; letter-spacing: -0.2px; }
  .team .seed { font-size: 0.7rem; color: var(--muted); font-weight: 500; }

  .score-box {
    font-size: 1.3rem; font-weight: 700; letter-spacing: 1px; text-align: center;
    padding: 10px 18px; border-radius: 10px; background: #f8f8f8;
    min-width: 64px; transition: 0.2s;
  }
  .score-box.has-score { background: var(--accent-dim); color: var(--accent); }
  .score-box::after { content: 'vs'; }
  .score-box.has-score::after { content: attr(data-score); }
  .score-box.loading { opacity: 0.6; }

  .card-meta {
    grid-column: 1 / -1; margin-top: 4px;
    display: flex; gap: 18px; flex-wrap: wrap;
    font-size: 0.78rem; color: var(--muted);
  }
  .card-meta a { color: var(--accent); text-decoration: none; font-weight: 600; }
  .card-meta a:hover { text-decoration: underline; }

  /* ── Expanded stats panel ── */
  .stats-panel {
    grid-column: 1 / -1; display: none; margin-top: 8px;
    border-top: 1px solid var(--subtle); padding-top: 16px;
  }
  .card.expanded .stats-panel { display: block; }

  .stats-table {
    width: 100%; border-collapse: collapse;
    font-size: 0.78rem; margin-top: 8px;
  }
  .stats-table th {
    text-align: left; font-weight: 600; color: var(--muted);
    font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.5px;
    padding: 8px 10px 6px; border-bottom: 1px solid var(--subtle);
  }
  .stats-table td {
    padding: 7px 10px; border-bottom: 1px solid #f5f5f5;
    font-weight: 500;
  }
  .stats-table .num { text-align: center; color: var(--muted); }
  .stats-table .name { font-weight: 600; }
  .stats-table .stat { text-align: center; }

  .stats-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 4px;
  }
  .stats-header h4 { font-size: 0.82rem; font-weight: 700; }
  .stats-header .lineup-tag {
    font-size: 0.65rem; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.5px; padding: 3px 8px; border-radius: 6px;
    background: var(--accent-dim); color: var(--accent);
  }

  .stats-empty {
    text-align: center; padding: 24px; color: var(--muted);
    font-size: 0.82rem;
  }

  /* ── Event card (non-game) ── */
  .event-card {
    background: var(--card); border: 1px solid var(--subtle);
    border-radius: var(--radius); padding: 20px 22px; margin-bottom: 14px;
    box-shadow: var(--shadow); display: flex; gap: 14px; align-items: flex-start;
  }
  .event-icon { font-size: 1.6rem; flex-shrink: 0; line-height: 1.2; }
  .event-body { flex: 1; }
  .event-body h3 { font-size: 1rem; font-weight: 700; letter-spacing: -0.2px; margin-bottom: 2px; }
  .event-body .time { font-size: 0.78rem; color: var(--accent); font-weight: 600; margin-bottom: 6px; }
  .event-body p { font-size: 0.82rem; color: var(--muted); line-height: 1.5; }

  /* ── Check-in ── */
  .checkin-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 8px; margin-top: 12px;
  }
  .checkin-item {
    display: flex; align-items: center; gap: 10px; padding: 10px 12px;
    background: var(--card); border: 1px solid var(--subtle);
    border-radius: 10px; cursor: pointer; user-select: none;
    transition: 0.12s; font-size: 0.88rem; font-weight: 500;
  }
  .checkin-item:hover { border-color: #ccc; }
  .checkin-item.checked { background: #f0faf3; border-color: #b7e4c7; }
  .checkin-item.checked .chk { background: var(--green); border-color: var(--green); }
  .checkin-item.checked .chk::after {
    content: ''; display: block; width: 6px; height: 10px;
    border: solid #fff; border-width: 0 2px 2px 0;
    transform: rotate(45deg) translate(-1px, -1px);
  }
  .chk {
    width: 20px; height: 20px; flex-shrink: 0; border: 2px solid #ccc;
    border-radius: 6px; display: flex; align-items: center; justify-content: center;
    transition: 0.12s;
  }
  .checkin-summary { text-align: center; margin-bottom: 16px; font-size: 0.82rem; color: var(--muted); font-weight: 500; }

  /* ── Map ── */
  .map { margin-top: 16px; border: 1px solid var(--subtle); border-radius: var(--radius); overflow: hidden; aspect-ratio: 16/9; }
  .map iframe { width:100%; height:100%; border:0; }

  /* ── Empty state ── */
  .empty { text-align: center; padding: 48px 20px; color: var(--muted); }
  .empty .icon { font-size: 2.4rem; margin-bottom: 10px; }
  .empty p { font-size: 0.92rem; font-weight: 500; }
  .empty small { font-size: 0.78rem; display: block; margin-top: 6px; }

  footer {
    text-align: center; padding: 20px; font-size: 0.72rem; color: var(--muted);
    border-top: 1px solid var(--subtle); max-width: 700px; margin: 0 auto;
  }

  @media (max-width: 500px) {
    .card { grid-template-columns: 1fr; text-align: center; }
    .card-time::before, .card-time::after { display: none; }
    .card-meta { justify-content: center; }
    .checkin-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); }
  }
</style>
</head>
<body>

<header>
  <div class="brand">
    <div class="dot"></div>
    <div><h1>Metro Hong Kong</h1><span>WMUCC 2026 · Mixed Masters · Pool D</span></div>
  </div>
  <div class="badge">Seed #36</div>
</header>

<nav id="tabs"></nav>
<main id="content"></main>
<footer>
  Nottingham Hockey Centre · UK London Time (BST, UTC+1) ·
  <a href="https://wmucc.sport" style="color:inherit">wmucc.sport</a>
</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// ═══════════════════════════════════════════
//  SUPABASE
// ═══════════════════════════════════════════

const SB = supabase.createClient(
  'https://ixmlpzipuigsdfzzxvld.supabase.co',
  ['eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9','eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml4bWxwemlwdWlnc2Rmenp4dmxkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5Mzk5NDQsImV4cCI6MjA5MDUxNTk0NH0','WRb0EdH7GKK2TsZdJ32_eanMC_aGgDEPysr0hlNTWks'].join('.')
);

// ═══════════════════════════════════════════
//  DATA
// ═══════════════════════════════════════════

const PLAYERS = [
  "Ada","Chor","Christy","Chuck","D Lu","Dave Learn","DIP","Dustin",
  "Emily","Esther","Eunice","Fran","Gio","Henry","JJ","Jess",
  "J Wu","Kay","Kris","Larry","Maisy","Max","Richard","Salina"
];

// ponytail: static schedule as fallback, Supabase is source of truth for scores
const GAMES = [
  { date:"2026-06-28", time:"11:30", opp:"UFO",                 oppSeed:19, oppFlag:"🇳🇱", field:"H13", pool:"Pool D" },
  { date:"2026-06-28", time:"17:00", opp:"Reading Ultimate",    oppSeed:13, oppFlag:"🇬🇧", field:"H09", pool:"Pool D" },
  { date:"2026-06-29", time:"17:00", opp:"Qold",                oppSeed: 4, oppFlag:"🇨🇦", field:"H08", pool:"Pool D" },
  { date:"2026-06-30", time:"16:00", opp:"Makawua Ultimate Club",oppSeed:30, oppFlag:"🇨🇴", field:"R24", pool:"Pool D" },
];

const EVENTS = [
  { date:"2026-06-27", icon:"⚽", title:"Team Warm-up",           time:"14:00 – 16:00", desc:"Riverside Sports Complex · Grass pitch. Pre-tournament session.", lat:52.9410, lng:-1.1700 },
  { date:"2026-06-27", icon:"🎉", title:"Opening Ceremony",     time:"TBC", desc:"Tournament kick-off at Highfields. Team parade and welcome." },
  { date:"2026-07-01", icon:"🤝", title:"Trade Night",          time:"Evening", desc:"Swap kit & swag with players from around the world." },
  { date:"2026-07-03", icon:"🎧", title:"WMUCC Official Party",  time:"21:30 – 02:00", desc:"Tournament Village. Live music + DJ Bradley James + DJ Tom Styles. Bring ID & accreditation." },
  { date:"2026-07-04", icon:"🏆", title:"Finals Day",           time:"All day", desc:"Medal games at Highfields. Trading continues — bring your swag!" },
];

const START = new Date("2026-06-26");
const END   = new Date("2026-07-04");
const DAYS  = Math.floor((END - START) / 86400000);
const TODAY = new Date();

const FIELD_COORDS = {
  H08: { lat:52.9378, lng:-1.2084 }, H09: { lat:52.9375, lng:-1.2078 },
  H13: { lat:52.9372, lng:-1.2072 }, R24: { lat:52.9368, lng:-1.2060 },
};
const VENUE = { lat:52.9375, lng:-1.2080 };

// ═══════════════════════════════════════════
//  HELPERS
// ═══════════════════════════════════════════

function fmtYMD(d)  { return d.toISOString().slice(0,10); }
function sameDay(a,b){ return a.getFullYear()===b.getFullYear() && a.getMonth()===b.getMonth() && a.getDate()===b.getDate(); }
function dayDate(idx) { const d = new Date(START); d.setDate(d.getDate() + idx); return d; }
function dayLabel(d) { return d.toLocaleDateString('en-GB', { weekday:'short', day:'numeric', month:'short' }); }
function defaultIdx() {
  const t = new Date(TODAY); t.setHours(0,0,0,0);
  if (t < START) return 0; if (t > END) return DAYS;
  return Math.floor((t - START) / 86400000);
}
function osmLink(field) {
  const c = FIELD_COORDS[field] || VENUE;
  return `https://www.openstreetmap.org/?mlat=${c.lat}&mlon=${c.lng}&zoom=18&layers=M`;
}
function mapEmbed(field) {
  const c = FIELD_COORDS[field] || VENUE;
  return `https://www.openstreetmap.org/export/embed.html?bbox=${c.lng-0.006},${c.lat-0.004},${c.lng+0.006},${c.lat+0.004}&layer=mapnik&marker=${c.lat},${c.lng}`;
}

// ═══════════════════════════════════════════
//  CHECK-IN (Supabase — syncs across devices)
//  ponytail: upsert via REST; table must exist with RLS allowing anon access
// ═══════════════════════════════════════════

let checkinCache = {}; // player_name → boolean

async function loadCheckins() {
  try {
    const { data, error } = await SB.from('checkins').select('player_name,checked_in');
    if (error) throw error;
    for (const r of data) checkinCache[r.player_name] = r.checked_in;
  } catch(e) {
    // ponytail: fallback to localStorage if table missing or RLS blocks
    console.warn('checkins table unavailable, using localStorage:', e.message);
    try { checkinCache = JSON.parse(localStorage.getItem('metro-checkin-2026')) || {}; }
    catch(_) { checkinCache = {}; }
  }
}

async function toggleCheckinAsync(player, checked) {
  checkinCache[player] = checked;
  try {
    const { error } = await SB.from('checkins').upsert({
      player_name: player, checked_in: checked, updated_at: new Date().toISOString()
    }, { onConflict: 'player_name' });
    if (error) throw error;
  } catch(e) {
    // fallback: save to localStorage
    console.warn('checkin save failed, using localStorage:', e.message);
    localStorage.setItem('metro-checkin-2026', JSON.stringify(checkinCache));
  }
}

// ═══════════════════════════════════════════
//  SUPABASE FETCH
// ═══════════════════════════════════════════

// Cache: game date+opponent → Supabase record
let sbCache = {};

async function loadScores() {
  const { data, error } = await SB.from('games').select('*');
  if (error) { console.warn('Supabase fetch error:', error); return; }
  for (const g of data) {
    const key = g.date + '|' + g.opponent;
    sbCache[key] = g;
  }
}

// ═══════════════════════════════════════════
//  RENDER
// ═══════════════════════════════════════════

let activeIdx = defaultIdx();

function renderAll() { renderTabs(); renderContent(); }

function renderTabs() {
  const tabs = document.getElementById('tabs');
  tabs.innerHTML = '';
  for (let i = 0; i <= DAYS; i++) {
    const d = dayDate(i);
    const ymd = fmtYMD(d);
    const hasThing = GAMES.some(g=>g.date===ymd) || EVENTS.some(e=>e.date===ymd) || i===0;
    const isPast = d < new Date(TODAY.getFullYear(), TODAY.getMonth(), TODAY.getDate());
    const isToday = sameDay(d, TODAY);
    const btn = document.createElement('button');
    btn.className = (i===activeIdx?'active ':'') + (isPast?'past ':'') + (isToday?'today ':'');
    btn.innerHTML = dayLabel(d).toUpperCase() + (hasThing ? '<span class="dot"></span>' : '');
    btn.onclick = ()=> { activeIdx = i; renderAll(); };
    tabs.appendChild(btn);
  }
}

function renderContent() {
  const d = dayDate(activeIdx);
  const ymd = fmtYMD(d);
  const dayGames = GAMES.filter(g=>g.date===ymd);
  const dayEvents = EVENTS.filter(e=>e.date===ymd);
  const isToday = sameDay(d, TODAY);
  const isPast = d < new Date(TODAY.getFullYear(), TODAY.getMonth(), TODAY.getDate());

  let html = `<div class="day-label">${isToday ? '<em>Today</em> · ' : ''}${isPast ? 'Completed · ' : ''}${dayLabel(d)}</div>`;
  html += `<h2>${activeIdx===0 ? 'Team Check-in' : dayLabel(d)}</h2>`;

  // ── CHECK-IN (day 0) ──
  if (activeIdx === 0) {
    const ci = checkinCache;
    const arrived = Object.values(ci).filter(Boolean).length;
    html += `<div class="checkin-summary">${arrived} / ${PLAYERS.length} arrived</div>`;
    html += `<div class="checkin-grid">`;
    for (const p of PLAYERS) {
      const checked = !!ci[p];
      html += `<div class="checkin-item${checked?' checked':''}" data-player="${p}" onclick="toggleCheckin(this)"><div class="chk"></div>${p}</div>`;
    }
    html += `</div>`;
  }

  // ── GAMES ──
  for (const g of dayGames) {
    const key = g.date + '|' + g.opp;
    const sb = sbCache[key];
    const hasScore = sb && (sb.our_score > 0 || sb.their_score > 0);
    const scoreStr = sb ? `${sb.our_score}–${sb.their_score}` : '';

    html += `<div class="card" data-date="${g.date}" data-opp="${g.opp}" onclick="toggleGameCard(this)">`;
    html += `<div class="card-time">${g.time} BST</div>`;
    html += `<div class="team"><div class="flag">🇭🇰</div><div class="name">Metro</div><div class="seed">Seed #36</div></div>`;
    html += `<div class="score-box${hasScore?' has-score':''}" data-score="${scoreStr}"></div>`;
    html += `<div class="team"><div class="flag">${g.oppFlag}</div><div class="name">${g.opp}</div><div class="seed">Seed #${g.oppSeed}</div></div>`;
    html += `<div class="card-meta">`;
    html += `<span>${g.pool}</span>`;
    html += `<span>Field <a href="${osmLink(g.field)}" target="_blank" onclick="event.stopPropagation()">${g.field} →</a></span>`;
    html += `</div>`;
    html += `<div class="stats-panel" id="stats-${g.date}-${g.opp.replace(/[^a-zA-Z0-9]/g,'')}">`;
    if (sb) {
      html += `<div class="stats-header">`;
      html += `<h4>Game Stats</h4>`;
      if (sb.start_od || sb.start_gender) {
        html += `<span class="lineup-tag">${[sb.start_od,sb.start_gender].filter(Boolean).join(' · ') || 'Lineup TBD'}</span>`;
      }
      html += `</div>`;
      html += `<div class="stats-empty">📊 Player stats will appear here once recorded.<br><small>Update via Supabase → <code>player_stats</code> table</small></div>`;
    } else {
      html += `<div class="stats-empty">Loading game data…</div>`;
    }
    html += `</div>`;
    html += `</div>`;
  }

  // ── EVENTS ──
  for (const e of dayEvents) {
    html += `<div class="event-card">`;
    html += `<div class="event-icon">${e.icon}</div>`;
    html += `<div class="event-body">`;
    html += `<h3>${e.title}</h3>`;
    html += `<div class="time">${e.time}</div>`;
    html += `<p>${e.desc}</p>`;
    html += `</div></div>`;
  }

  // ── Map ──
  if (dayGames.length) {
    const fields = [...new Set(dayGames.map(g=>g.field))];
    html += `<div class="map"><iframe src="${mapEmbed(fields[0])}"></iframe></div>`;
  } else {
    const locEvent = dayEvents.find(e => e.lat);
    if (locEvent) {
      html += `<div class="map"><iframe src="https://www.openstreetmap.org/export/embed.html?bbox=${locEvent.lng-0.006},${locEvent.lat-0.004},${locEvent.lng+0.006},${locEvent.lat+0.004}&layer=mapnik&marker=${locEvent.lat},${locEvent.lng}"></iframe></div>`;
    }
  }

  if (!dayGames.length && !dayEvents.length && activeIdx !== 0) {
    const bracket = activeIdx >= 4;
    html += `<div class="empty">`;
    html += `<div class="icon">${bracket ? '🏆' : '🛌'}</div>`;
    html += `<p>${bracket ? 'Bracket play — schedule TBD' : 'Rest day — no games scheduled'}</p>`;
    html += `<small>Check <a href="https://wmucc.sport" style="color:var(--accent)">wmucc.sport</a> for updates</small>`;
    html += `</div>`;
  }

  document.getElementById('content').innerHTML = html;
}

// ═══════════════════════════════════════════
//  TOGGLE GAME CARD
// ═══════════════════════════════════════════

window.toggleGameCard = function(card) {
  // If clicking a link inside, don't toggle
  if (event.target.tagName === 'A') return;
  card.classList.toggle('expanded');
};

// ═══════════════════════════════════════════
//  CHECKIN TOGGLE
// ═══════════════════════════════════════════

window.toggleCheckin = function(el) {
  const player = el.dataset.player;
  const newState = !el.classList.contains('checked');
  toggleCheckinAsync(player, newState);
  el.classList.toggle('checked');
  const arrived = Object.values(checkinCache).filter(Boolean).length;
  const sum = document.querySelector('.checkin-summary');
  if (sum) sum.textContent = `${arrived} / ${PLAYERS.length} arrived`;
};

// ═══════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════

(async function init() {
  await Promise.all([loadScores(), loadCheckins()]);
  renderAll();
})();
</script>
</body>
</html>
