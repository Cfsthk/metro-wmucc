<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>UK Road Trip · Rugby → Scotland → London</title>
<style>
:root {
  --bg: #f5f0e8;
  --card: #fffef9;
  --accent: #8b4513;
  --accent2: #c75b39;
  --text: #2c1810;
  --muted: #6b5b4f;
  --border: #d4c5b2;
  --tag-bg: #f0e6d3;
  --day1: #d4a574;
  --day2: #8fbc8f;
  --day3: #7b9eb3;
  --day4: #b8a9c9;
  --day5: #e8a87c;
  --day6: #d4a574;
  --day7: #95b8d1;
  --free: #4a7c59;
  --shadow: 0 2px 12px rgba(44, 24, 16, 0.08);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 15px; scroll-behavior: smooth; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  max-width: 500px;
  margin: 0 auto;
  min-height: 100vh;
}

/* --- HEADER --- */
header {
  background: linear-gradient(135deg, #3d2b1f 0%, #5c3d2e 40%, #8b6914 100%);
  color: #fff;
  padding: 24px 16px 20px;
  text-align: center;
  position: relative;
  overflow: hidden;
}
header::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.05'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
}
header h1 { font-size: 1.5rem; font-weight: 700; letter-spacing: -0.3px; }
header p { font-size: 0.82rem; opacity: 0.85; margin-top: 4px; }

/* --- TRIP META BAR --- */
.trip-meta {
  display: flex;
  justify-content: space-around;
  padding: 12px 8px;
  background: var(--card);
  border-bottom: 1px solid var(--border);
  font-size: 0.72rem;
  color: var(--muted);
  gap: 4px;
  flex-wrap: wrap;
}
.trip-meta span { text-align: center; white-space: nowrap; }
.trip-meta strong { display: block; color: var(--accent); font-size: 0.85rem; }

/* --- DAY NAV PILLS --- */
.day-nav {
  display: flex;
  gap: 4px;
  padding: 10px 8px;
  overflow-x: auto;
  background: var(--card);
  border-bottom: 1px solid var(--border);
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.day-nav::-webkit-scrollbar { display: none; }
.day-pill {
  flex-shrink: 0;
  padding: 6px 12px;
  border-radius: 20px;
  border: 1.5px solid var(--border);
  background: #fff;
  font-size: 0.75rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
  color: var(--muted);
}
.day-pill.active {
  background: var(--accent);
  color: #fff;
  border-color: var(--accent);
}
.day-pill:active { transform: scale(0.96); }

/* --- MAIN SECTION --- */
main { padding: 12px 10px 80px; }
.day-section { display: none; }
.day-section.active { display: block; }

.day-header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 12px;
}
.day-dot {
  width: 36px; height: 36px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  color: #fff; font-weight: 700; font-size: 0.9rem;
  flex-shrink: 0;
}
.day-title { font-size: 1.15rem; font-weight: 700; }
.day-subtitle { font-size: 0.75rem; color: var(--muted); }

/* --- ROUTE CARD --- */
.route-card {
  background: var(--card);
  border-radius: 12px;
  padding: 10px 12px;
  margin-bottom: 10px;
  border: 1px solid var(--border);
  font-size: 0.78rem;
  display: flex;
  align-items: center;
  gap: 8px;
}
.route-icon { font-size: 1.3rem; flex-shrink: 0; }
.route-text strong { color: var(--accent); }

/* --- SPOT CARD --- */
.spot-card {
  background: var(--card);
  border-radius: 12px;
  padding: 14px;
  margin-bottom: 10px;
  border: 1px solid var(--border);
  box-shadow: var(--shadow);
  transition: all 0.2s;
  position: relative;
}
.spot-card.selected {
  border-color: var(--accent2);
  box-shadow: 0 0 0 2px rgba(199, 91, 57, 0.15);
}
.spot-top {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 8px;
  margin-bottom: 6px;
}
.spot-name {
  font-weight: 700;
  font-size: 0.95rem;
  flex: 1;
}
.spot-check {
  width: 22px; height: 22px;
  border-radius: 6px;
  border: 2px solid var(--border);
  flex-shrink: 0;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s;
  font-size: 0.7rem;
}
.spot-check.checked {
  background: var(--accent2);
  border-color: var(--accent2);
  color: #fff;
}
.spot-tags { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 6px; }
.tag {
  font-size: 0.65rem;
  padding: 2px 7px;
  border-radius: 12px;
  background: var(--tag-bg);
  color: var(--accent);
  font-weight: 600;
}
.tag.free { background: #d4edda; color: var(--free); }
.tag.paid { background: #ffe4c4; color: #b85c1a; }
.tag.food { background: #fce4ec; color: #b71c4e; }
.tag.must { background: #fff3cd; color: #856404; }
.spot-desc { font-size: 0.78rem; color: var(--muted); margin-bottom: 8px; line-height: 1.5; }
.spot-price { font-size: 0.78rem; font-weight: 600; margin-bottom: 6px; }
.spot-links { display: flex; gap: 8px; flex-wrap: wrap; }
.spot-link {
  font-size: 0.7rem;
  padding: 4px 10px;
  border-radius: 14px;
  background: var(--accent);
  color: #fff;
  text-decoration: none;
  display: inline-flex;
  align-items: center;
  gap: 4px;
  transition: opacity 0.15s;
}
.spot-link:active { opacity: 0.7; }
.spot-link.web { background: #5c3d2e; }

/* --- SECTION HEADER --- */
.section-label {
  font-size: 0.7rem;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  color: var(--muted);
  margin: 14px 0 8px;
  padding-left: 2px;
  font-weight: 700;
}

/* --- RESTAURANT CARD --- */
.food-card {
  background: var(--card);
  border-radius: 10px;
  padding: 10px 12px;
  margin-bottom: 8px;
  border: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 8px;
}
.food-info { flex: 1; }
.food-name { font-weight: 600; font-size: 0.85rem; }
.food-desc { font-size: 0.7rem; color: var(--muted); }
.food-price { font-size: 0.72rem; font-weight: 600; color: var(--accent2); }

/* --- FLOATING BAR --- */
.floating-bar {
  position: fixed;
  bottom: 12px;
  left: 50%;
  transform: translateX(-50%);
  max-width: 500px;
  width: calc(100% - 24px);
  background: var(--accent);
  color: #fff;
  border-radius: 16px;
  padding: 10px 16px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  box-shadow: 0 4px 20px rgba(139, 69, 19, 0.3);
  z-index: 100;
  font-size: 0.8rem;
  font-weight: 600;
  cursor: pointer;
}
.floating-bar:active { opacity: 0.9; }
.floating-count { background: rgba(255,255,255,0.25); border-radius: 12px; padding: 2px 10px; font-size: 0.75rem; }

/* --- TIPS SECTION --- */
.tips-card {
  background: linear-gradient(135deg, #fffef9 0%, #faf5e8 100%);
  border-radius: 12px;
  padding: 14px;
  margin-bottom: 10px;
  border: 1.5px dashed var(--accent);
}
.tips-card h3 { font-size: 0.95rem; margin-bottom: 8px; color: var(--accent); }
.tip-item {
  display: flex;
  gap: 8px;
  margin-bottom: 8px;
  font-size: 0.78rem;
  align-items: flex-start;
}
.tip-icon { flex-shrink: 0; font-size: 1rem; }
.tip-text strong { color: var(--accent); }

/* --- MODAL --- */
.modal-overlay {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(44, 24, 16, 0.6);
  z-index: 200;
  justify-content: center;
  align-items: flex-end;
}
.modal-overlay.show { display: flex; }
.modal-sheet {
  background: var(--card);
  border-radius: 20px 20px 0 0;
  padding: 20px 16px 28px;
  max-width: 500px;
  width: 100%;
  max-height: 80vh;
  overflow-y: auto;
}
.modal-handle {
  width: 40px; height: 4px;
  background: var(--border);
  border-radius: 2px;
  margin: 0 auto 16px;
}
.modal-sheet h3 { font-size: 1.05rem; margin-bottom: 12px; }
.modal-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 8px 0;
  border-bottom: 1px solid #f0e6d3;
  font-size: 0.82rem;
}
.modal-remove {
  color: #c0392b;
  font-size: 0.7rem;
  cursor: pointer;
  padding: 4px 8px;
}
.modal-total {
  margin-top: 12px;
  padding-top: 10px;
  border-top: 2px solid var(--accent);
  font-weight: 700;
  font-size: 0.9rem;
}

/* --- RESPONSIVE --- */
@media (max-width: 380px) {
  html { font-size: 14px; }
  .day-pill { padding: 5px 10px; font-size: 0.7rem; }
}

/* --- PRINT --- */
@media print {
  .floating-bar, .day-nav, .modal-overlay { display: none !important; }
  .day-section { display: block !important; page-break-inside: avoid; }
}
</style>
</head>
<body>

<header>
  <h1>🇬🇧 UK Road Trip</h1>
  <p>Rugby → Cotswolds → Glasgow → Edinburgh → Northumberland → London</p>
</header>

<div class="trip-meta">
  <span><strong>📍 5–11 July</strong>7 days</span>
  <span><strong>🚗 ~1,200 mi</strong>driving</span>
  <span><strong>🏰 8 castles</strong>heritage</span>
  <span><strong>💰 £200–350</strong>attractions</span>
</div>

<nav class="day-nav" id="dayNav"></nav>

<main id="main"></main>

<div class="floating-bar" onclick="openSummary()">
  <span>📋 My Itinerary</span>
  <span class="floating-count" id="floatCount">0 spots</span>
</div>

<div class="modal-overlay" id="modal">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <h3>📋 My Selected Spots</h3>
    <div id="modalList"><p style="color:var(--muted);font-size:0.82rem;">Tap the checkboxes on spot cards to add them here.</p></div>
    <div class="modal-total" id="modalTotal" style="display:none"></div>
    <button onclick="closeSummary()" style="margin-top:12px;width:100%;padding:10px;border-radius:10px;border:none;background:var(--accent);color:#fff;font-weight:600;font-size:0.85rem;cursor:pointer">Done</button>
  </div>
</div>

<script>
// ── DATA ──────────────────────────────────────
const DAYS = [
  {

    subtitle: 'Arrive Rugby morning · Explore medieval England',
    route: { from: 'Rugby', to: 'Warwick & Stratford', drive: '30 min each way', map: 'https://www.google.com/maps/dir/Rugby,+UK/Warwick+Castle,+UK/Stratford-upon-Avon,+UK' },
    spots: [
      { id: 's1', name: '🏰 Warwick Castle', type: 'heritage', tags: ['Heritage', 'Paid', 'Must-See'], desc: 'One of Britain\'s finest medieval castles — towers, dungeons, trebuchet shows, and beautiful gardens. Over 1,100 years of history. Allow 3–4 hours.', price: '£24–28 online (save ~15% vs gate £32)', map: 'https://maps.google.com/maps?q=Warwick+Castle+CV34+6AH', web: 'https://www.warwick-castle.com/' },
      { id: 's2', name: '🏛️ Rugby School & Museum', type: 'museum', tags: ['Heritage', 'Paid'], desc: 'Where the sport of rugby was born in 1823. Visit the school grounds, the Webb Ellis Museum, and see the famous field.', price: '~£8 museum entry', map: 'https://maps.google.com/maps?q=Rugby+School+CV22+5EH', web: 'https://www.rugbyschool.co.uk/' },
      { id: 's3', name: '✍️ Stratford-upon-Avon', type: 'heritage', tags: ['Heritage', 'Paid'], desc: 'Shakespeare\'s birthplace and hometown. Visit the Birthplace, Anne Hathaway\'s Cottage, and stroll the charming Tudor streets along the River Avon.', price: 'Birthplace ~£17.50 (combo ticket £25 for 3 properties)', map: 'https://maps.google.com/maps?q=Shakespeare+Birthplace+Stratford+upon+Avon+CV37+6QW', web: 'https://www.shakespeare.org.uk/' },

    ],
    restaurants: [
      { name: 'The Merchants Inn', desc: 'Traditional British pub, best Sunday roast in Rugby', price: '££' },

      { name: 'The Fourteas', desc: '1940s-themed tea room near Shakespeare\'s Birthplace, Stratford', price: '£' },
      { name: 'The Old Thatch Tavern', desc: 'Oldest pub in Stratford (~1470), proper ales', price: '££' },
    ]
  },
  {
    id: 2, date: '6 July (Sun)', title: 'Cotswolds → Lake District → Glasgow', color: '#8fbc8f',

    spots: [
      { id: 's5', name: '🏘️ Bourton-on-the-Water', type: 'scenery', tags: ['Scenery', 'Free', 'Must-See'], desc: '"Venice of the Cotswolds" — picturesque stone bridges over the River Windrush, honey-coloured cottages, and charming tea rooms. Perfect morning stroll.', price: 'Free (village walk)', map: 'https://maps.google.com/maps?q=Bourton+on+the+Water+GL54+2BU' },
      { id: 's6', name: '🏘️ Bibury', type: 'scenery', tags: ['Scenery', 'Free', 'Must-See'], desc: 'William Morris called it "the most beautiful village in England." Arlington Row — the most photographed cottages in the UK.', price: 'Free (village walk, parking ~£3)', map: 'https://maps.google.com/maps?q=Bibury+GL7+5NL' },
      { id: 's7', name: '🏞️ Lake Windermere', type: 'scenery', tags: ['Scenery', 'Free', 'Stop'], desc: 'England\'s largest lake. Quick stop at Bowness-on-Windermere — stretch your legs, grab lunch by the water, see the swans. Optional lake cruise if time.', price: 'Free (shore walk); cruise ~£12', map: 'https://maps.google.com/maps?q=Bowness+on+Windermere+LA23+3HJ' },

      { name: 'The Patterdale Hotel Bar', desc: 'Quick pub lunch near Ullswater, Lake District', price: '£' },

  {

      { id: 's10', name: '⛪ Glasgow Cathedral', type: 'heritage', tags: ['Heritage', 'Free'], desc: 'Magnificent 12th-century Gothic cathedral, the only mainland Scottish cathedral to survive the Reformation intact. Stunning stained glass and crypt.', price: 'FREE', map: 'https://maps.google.com/maps?q=Glasgow+Cathedral+G4+0QZ' },

      { name: 'The Dome', desc: 'Spectacular Georgian building, afternoon tea or dinner', price: '£££' },

  {

  { icon:'🏰', text:'<strong>National Trust Touring Pass: ~£33</strong> — 7-day pass for overseas visitors. Covers Cotswolds properties, Lake District sites, and stately homes.' },
  { icon:'🎟️', text:'<strong>Book everything online in advance</strong> — castles and attractions are £3–8 cheaper online. Edinburgh Castle sells out in summer — book minimum 2 weeks ahead.' },
  { icon:'🏛️', text:'<strong>London museums are FREE</strong> — British Museum, Natural History, V&A, National Gallery, Tate Modern. This saves you £100+ vs paying for attractions.' },
  { icon:'🚂', text:'<strong>2-for-1 Days Out Guide</strong> — with any National Rail ticket, get 2-for-1 entry at Tower of London, Westminster Abbey, and more. Keep your train ticket! <a href="https://www.daysoutguide.co.uk/" target="_blank">daysoutguide.co.uk</a>' },
  { icon:'💳', text:'<strong>Use contactless/Oyster for London transport</strong> — daily cap is ~£8.50 (zones 1–2). Never buy paper tickets. Tap the same card all day.' },
  { icon:'🚗', text:'<strong>Petrol saving</strong> — fill up at supermarket stations (Tesco, Sainsbury\'s) — typically 5–10p/litre cheaper than motorway services. Use Waze for cheapest fuel en route.' },
  { icon:'🍽️', text:'<strong>Eat at pubs, not restaurants</strong> — pub mains £12–18 vs restaurant £25–40. "Meal deals" at chains like Wetherspoons: burger + drink ~£8. For London, meal deals at Tesco/Boots ~£4–5 for lunch.' },
  { icon:'🏨', text:'<strong>Accommodation</strong> — Premier Inn / Travelodge are reliable and cheap if booked early (~£40–70/night). Consider university accommodation in summer (Edinburgh, York, London — book via universityrooms.com).' },
  { icon:'📱', text:'<strong>Get a UK SIM/eSIM</strong> — giffgaff, Three, or EE pay-as-you-go. ~£10–15 for 10–20GB. Or use Airalo eSIM. Essential for Google Maps navigation.' },
  { icon:'🗺️', text:'<strong>Download offline Google Maps</strong> for all your route areas before the trip. Rural areas (Cotswolds, Northumberland, Lake District) have spotty signal.' },
  { icon:'🌧️', text:'<strong>Pack layers & waterproof</strong> — UK summer weather is unpredictable. A good waterproof jacket saves £ on indoor-only backup plans. Umbrella + sunglasses.' },

// ── RENDER ────────────────────────────────────
let selectedSpots = JSON.parse(localStorage.getItem('uk-trip-spots') || '[]');

function renderAll() {
  renderNav();
  renderDays();
  updateFloatingBar();
}

function renderNav() {
  const nav = document.getElementById('dayNav');
  nav.innerHTML = DAYS.map((d,i) =>
    `<div class="day-pill${i===0?' active':''}" onclick="showDay(${i})">Day ${d.id}</div>`
  ).join('');
}

function showDay(idx) {
  document.querySelectorAll('.day-section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.day-pill').forEach(p => p.classList.remove('active'));
  document.getElementById('day'+idx)?.classList.add('active');
  document.querySelectorAll('.day-pill')[idx]?.classList.add('active');
  document.getElementById('day'+idx)?.scrollIntoView({behavior:'smooth',block:'start'});
}

function renderDays() {
  const main = document.getElementById('main');
  main.innerHTML = DAYS.map((day, di) => `
    <section class="day-section${di===0?' active':''}" id="day${di}">
      <div class="day-header">
        <div class="day-dot" style="background:${day.color}">${day.id}</div>
        <div>
          <div class="day-title">${day.title}</div>
          <div class="day-subtitle">${day.date} · ${day.subtitle}</div>
        </div>
      </div>

      <a href="${day.route.map}" target="_blank" class="route-card" style="text-decoration:none;color:inherit;">
        <span class="route-icon">🗺️</span>
        <span class="route-text"><strong>${day.route.from}</strong> → <strong>${day.route.to}</strong> · ${day.route.drive}</span>
      </a>

      <div class="section-label">📍 Sightseeing Spots</div>
      ${day.spots.map(s => renderSpot(s)).join('')}

      <div class="section-label">🍽️ Food & Restaurants</div>
      ${day.restaurants.map(r => `
        <div class="food-card">
          <div class="food-info">
            <div class="food-name">${r.name}</div>
            <div class="food-desc">${r.desc}</div>
          </div>
          <div class="food-price">${r.price}</div>
        </div>
      `).join('')}
    </section>
  `).join('');

  // Money tips section at end
  const tipsSection = document.createElement('div');
  tipsSection.className = 'day-section';
  tipsSection.id = 'tips';
  tipsSection.innerHTML = `
    <div class="day-header">
      <div class="day-dot" style="background:#f0c040">💰</div>
      <div>
        <div class="day-title">Money Saving Tips</div>
        <div class="day-subtitle">12 ways to cut costs on your UK trip</div>
      </div>
    </div>
    ${TIPS.map(t => `
      <div class="tips-card">
        <div class="tip-item">
          <span class="tip-icon">${t.icon}</span>
          <span class="tip-text">${t.text}</span>
        </div>
      </div>
    `).join('')}
  `;
  main.appendChild(tipsSection);

  // Add Tips to nav
  const nav = document.getElementById('dayNav');
  const tipsPill = document.createElement('div');
  tipsPill.className = 'day-pill';
  tipsPill.textContent = '💰 Tips';
  tipsPill.onclick = () => showTips();
  nav.appendChild(tipsPill);

  // Restore selections
  restoreChecks();
}

function renderSpot(s) {
  const checked = selectedSpots.includes(s.id);
  return `
    <div class="spot-card${checked?' selected':''}" id="card-${s.id}">
      <div class="spot-top">
        <span class="spot-name">${s.name}</span>
        <div class="spot-check${checked?' checked':''}" onclick="toggleSpot('${s.id}')">${checked?'✓':''}</div>
      </div>
      <div class="spot-tags">
        ${s.tags.map(t => {
          let cls = 'tag';
          if (t === 'Free' || t === 'Free-Entry' || t === 'Free-Exterior') cls += ' free';
          else if (t === 'Paid') cls += ' paid';
          else if (t === 'Food') cls += ' food';
          else if (t === 'Must-See') cls += ' must';
          return `<span class="${cls}">${t}</span>`;
        }).join('')}
      </div>
      <div class="spot-desc">${s.desc}</div>
      <div class="spot-price">${s.price.startsWith('FREE') || s.price.startsWith('Free') ?
        '🟢 ' + s.price : '🎟️ ' + s.price}</div>
      <div class="spot-links">
        <a href="${s.map}" target="_blank" class="spot-link">📍 Google Maps</a>
        ${s.web ? `<a href="${s.web}" target="_blank" class="spot-link web">🌐 Website</a>` : ''}
      </div>
    </div>
  `;
}

function toggleSpot(id) {
  const idx = selectedSpots.indexOf(id);
  if (idx > -1) {
    selectedSpots.splice(idx, 1);
  } else {
    selectedSpots.push(id);
  }
  localStorage.setItem('uk-trip-spots', JSON.stringify(selectedSpots));
  restoreChecks();
  updateFloatingBar();
}

function restoreChecks() {
  document.querySelectorAll('.spot-check').forEach(el => {
    const card = el.closest('.spot-card');
    if (!card) return;
    const id = card.id.replace('card-', '');
    const checked = selectedSpots.includes(id);
    el.classList.toggle('checked', checked);
    el.textContent = checked ? '✓' : '';
    card.classList.toggle('selected', checked);
  });
}

function updateFloatingBar() {
  document.getElementById('floatCount').textContent = selectedSpots.length + ' spot' + (selectedSpots.length!==1?'s':'');
}

function showTips() {
  document.querySelectorAll('.day-section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.day-pill').forEach(p => p.classList.remove('active'));
  document.getElementById('tips').classList.add('active');
  const nav = document.getElementById('dayNav');
  nav.querySelectorAll('.day-pill')[nav.querySelectorAll('.day-pill').length-1].classList.add('active');
  document.getElementById('tips').scrollIntoView({behavior:'smooth',block:'start'});
}

function openSummary() {
  const modal = document.getElementById('modal');
  const list = document.getElementById('modalList');
  const totalEl = document.getElementById('modalTotal');

  if (selectedSpots.length === 0) {
    list.innerHTML = '<p style="color:var(--muted);font-size:0.82rem;">Tap the checkboxes on spot cards to add them here.</p>';
    totalEl.style.display = 'none';
  } else {
    // Collect all spots
    const allSpots = {};
    DAYS.forEach(d => d.spots.forEach(s => allSpots[s.id] = s));
    list.innerHTML = selectedSpots.map(id => {
      const s = allSpots[id];
      return s ? `<div class="modal-item"><span>${s.name}</span><span style="font-size:0.72rem;color:var(--muted)">${s.price.split('.')[0]}</span><span class="modal-remove" onclick="event.stopPropagation();toggleSpot('${id}');openSummary();">Remove</span></div>` : '';
    }).join('');
    list.innerHTML += `<div style="margin-top:8px;font-size:0.72rem;color:var(--muted)">💡 Save this page — your selections are saved in your browser.</div>`;
    totalEl.style.display = 'block';
    totalEl.innerHTML = `Total spots selected: <strong>${selectedSpots.length}</strong> · Tap spots to add/remove`;
  }
  modal.classList.add('show');
}

function closeSummary() {
  document.getElementById('modal').classList.remove('show');
  renderDays(); // re-render to reflect any removals
  updateFloatingBar();
}

// Close modal on overlay click
document.addEventListener('click', function(e) {
  if (e.target.id === 'modal') closeSummary();
});

// Init
renderAll();
</script>
